<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .pdt-card {
            display: inline-block;
            background-color: bisque;
            margin: 5px;
            padding: 10px;
        }

        .name {
            font-size: 24px;
            color: maroon;
            font-weight: bold;
        }

        .price {
            font-size: 22px;
            color: violet;
        }

        .price::before {
            content: "Rs. ";
            font-size: 16px;
            color: goldenrod;
        }

        .action {
            padding: 5px;
            margin: 5px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="parent">
    </div>

    <script>

        parentRef = document.getElementById("parent")

        async function getProducts() {
            const rawResponse = await fetch("http://localhost:3000/product/list", {
                method: "GET",
                headers: {
                    "authorization": sessionStorage.getItem("token")
                }
            })

            const apiResponse = await rawResponse.json()
            console.log(apiResponse)

            renderProducts(apiResponse.data)
        }

        getProducts()

        function renderProducts(products) {

            parentRef.innerHTML = ''

            products.forEach(product => {
                parentRef.innerHTML += `<div class='pdt-card'>
                         <div class='name'>${product.name}</div>
                         <div class='price'>${product.price}</div>
                         <div>${product.detail}</div>
                         <div class="action">
                            <button onclick="orderPdt(${product.pid})">Buy</button>
                         </div>
                    </div>`
            })
        }

        async function orderPdt(pid) {

            location.href = `../customer/payment.html?pid=${pid}`

        }

    </script>
</body>

</html>
