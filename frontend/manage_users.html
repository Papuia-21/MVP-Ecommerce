<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    
    <div id="parent">

    </div>

    <script>

        parentRef = document.getElementById("parent")

        async function listUsers() {
            const rawResponse = await fetch("http://localhost:3000/auth/list",{
                headers:{
                    "Authorization":sessionStorage.getItem("token")
                }
            })
            const apiResponse = await rawResponse.json()

            console.log(apiResponse)
            alert(apiResponse.message)
            parentRef.textContent = JSON.stringify(apiResponse.data)
        }

        listUsers()
    </script>
</body>
</html>
